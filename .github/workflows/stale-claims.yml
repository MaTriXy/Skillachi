name: Stale Claim Cleanup

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  cleanup-stale-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This benchmark claim has been open for 48 hours with no PR. Releasing the slot so others can run it."
          close-issue-message: "Claim expired after 48 hours. This slot is now available. Run `npx skillachi-runner --contribute` to pick it up."
          days-before-stale: 2
          days-before-close: 0
          only-labels: "benchmark-claim"
          stale-issue-label: "stale-claim"
          exempt-issue-labels: "in-progress"
