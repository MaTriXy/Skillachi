name: Publish Gaps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-gaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install runner deps
        run: cd runner && npm ci

      - name: Generate gaps.json
        run: node runner/run.js --gaps

      - name: Commit gaps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/gaps.json || true
          git diff --staged --quiet || git commit -m "chore: update gaps.json"
          git push || true
